<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, minimum-scale=1.0">

<title>{% if page.title %}{{ page.title }} &middot; {% endif %}Nathaniel Ward</title>
<meta name="author" content="Nathaniel Ward">

<meta name="theme-color" content="#f7f4ee">

<link rel="icon" href="{{ '/favicon.svg' | relative_url }}" type="image/svg+xml">
<link rel="icon" href="{{ '/favicon.ico' | relative_url }}" sizes="any">
<link rel="apple-touch-icon" href="{{ '/apple-touch-icon.png' | relative_url }}">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style/style.css">

<meta name="twitter:card" content="summary">
<meta property="og:image" content="/social-preview.jpeg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
    
{% if page.title %}
    <meta property="og:title" content="{{ page.title }} | Nathaniel Ward" />
{% endif %}
{% if page.excerpt %}
	<meta name="description" content="{{ page.excerpt| strip_html }}">
	<meta property="og:description" content="{{ page.excerpt| strip_html }}" />
{% else %}
	<meta name="description" content="{{ site.description }}">
	<meta property="og:description" content="{{ site.description }}" />
{% endif %}
{% if page.tags %}
<meta name="keywords" content="{{ page.tags }}">
{% endif %}

	<link rel="alternate" type="application/rss+xml" title="Nathaniel Ward" href="{{ site.baseurl }}/feed.xml" />

	<link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">
	<link rel="me" href="https://micro.blog/nathanielward" />
	<link rel="me" href="https://twitter.com/nathanielward" />
	<link rel="me" href="https://github.com/nathanielward/" />
    <link rel="me" href="https://bsky.app/profile/nathanielward.net" />
	<link rel="me" href="https://mastodon.social/@nathanielward" />
</head>
